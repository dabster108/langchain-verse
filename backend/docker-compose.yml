services:
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fraud_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: fraud_redis
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  neo4j:
    image: neo4j:5
    container_name: fraud_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j:/var/lib/neo4j/import

  geo-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: geo-agent
        PORT: 8002
    container_name: geo_agent
    env_file: [.env]
    environment:
      SERVICE: geo-agent
      PORT: 8002
      REDIS_HOST: redis
    ports: ["8002:8002"]
    depends_on: [postgres, redis, neo4j]

  velocity-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: velocity-agent
        PORT: 8001
    container_name: velocity_agent
    env_file: [.env]
    environment:
      SERVICE: velocity-agent
      PORT: 8001
      REDIS_HOST: redis
    ports: ["8001:8001"]
    depends_on: [postgres, redis]

  behavior-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: behavior-agent
        PORT: 8003
    container_name: behavior_agent
    env_file: [.env]
    environment:
      SERVICE: behavior-agent
      PORT: 8003
      MODELS_DIR: /app/ml/models
      REDIS_HOST: redis
    ports: ["8003:8003"]
    volumes:
      - ./ml/models:/app/ml/models
    depends_on: [postgres, redis]

  synthesis-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: synthesis-agent
        PORT: 8004
    container_name: synthesis_agent
    env_file: [.env]
    environment:
      SERVICE: synthesis-agent
      PORT: 8004
      REDIS_HOST: redis
    ports: ["8004:8004"]
    depends_on: [postgres, redis]

  decision-otp-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: decision-otp-service
        PORT: 8005
    container_name: decision_otp_service
    env_file: [.env]
    environment:
      SERVICE: decision-otp-service
      PORT: 8005
      REDIS_HOST: redis
    ports: ["8005:8005"]
    depends_on: [postgres, redis]

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
        PORT: 8000
    container_name: fraud_api_gateway
    env_file: [.env]
    environment:
      SERVICE: api-gateway
      PORT: 8000
      REDIS_HOST: redis
    ports: ["8000:8000"]
    depends_on: [redis, geo-agent, velocity-agent, behavior-agent, synthesis-agent, decision-otp-service]

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
