services:
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fraud_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: fraud_redis
    restart: always
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: fraud_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j:/var/lib/neo4j/import

  geo-agent:
    build:
      context: ./services/geo-agent
    container_name: geo_agent
    env_file:
      - .env
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
      - neo4j

  velocity-agent:
    build:
      context: ./services/velocity-agent
    container_name: velocity_agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  behavior-agent:
    build:
      context: ./services/behavior-agent
    container_name: behavior_agent
    env_file:
      - .env
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  synthesis-agent:
    build:
      context: ./services/synthesis-agent
    container_name: synthesis_agent
    env_file:
      - .env
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: fraud_api_gateway
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - geo-agent
      - velocity-agent
      - behavior-agent

volumes:
  postgres_data:
  neo4j_data:
